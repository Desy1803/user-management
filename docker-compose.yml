version: '3.8'
services:
  postgres-db:
    image: postgres:15-alpine
    container_name: user_crud_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-PasswordSQL123}
      POSTGRES_DB: ${POSTGRES_DB:-user_management_db}
    ports:
      - "5433:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data

volumes:
  postgres_data: