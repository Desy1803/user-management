version: '3.8'
services:
  postgres-db:
    image: postgres:15-alpine
    container_name: user_crud_db
    environment:
      POSTGRES_USER: ${POSTGRES_USER:-postgres}
      POSTGRES_PASSWORD: ${POSTGRES_PASSWORD:-PasswordSQL123}
      POSTGRES_DB: ${POSTGRES_DB:-user_management_db}
    ports:
      - "5432:5432" 
    volumes:
      - postgres_data:/var/lib/postgresql/data
    networks:
      - user-management-network 
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U $${POSTGRES_USER:-postgres} -d $${POSTGRES_DB:-user_management_db}"]
      interval: 5s
      timeout: 5s
      retries: 5

  user-app:
    build: .
    container_name: user_management_app
    ports:
      - "8080:8080"
    networks:
      - user-management-network
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://postgres-db:5432/${POSTGRES_DB:-user_management_db}
      - SPRING_DATASOURCE_USERNAME=${POSTGRES_USER:-postgres}
      - SPRING_DATASOURCE_PASSWORD=${POSTGRES_PASSWORD:-PasswordSQL123}
      - SPRING_JPA_HIBERNATE_DDL_AUTO=update
    depends_on:
      postgres-db:
        condition: service_healthy

networks:
  user-management-network:
    driver: bridge

volumes:
  postgres_data: